services:
  postgres:
    image: postgres:16-alpine
    container_name: healthcare-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  redis:
    image: redis:7-alpine
    container_name: healthcare-redis
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: healthcare-auth-service
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/auth_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_min_32_chars_here}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='{\"query\":\"{__typename}\"}' --header='Content-Type: application/json' http://localhost:3001/graphql || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - healthcare-network

  schedule-service:
    build:
      context: ./schedule-service
      dockerfile: Dockerfile
    container_name: healthcare-schedule-service
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/schedule_db?schema=public
      AUTH_SERVICE_URL: http://auth-service:3001
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${SCHEDULE_SERVICE_PORT:-3002}:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='{\"query\":\"{__typename}\"}' --header='Content-Type: application/json' http://localhost:3002/graphql || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - healthcare-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: healthcare-notification-service
    environment:
      NODE_ENV: production
      PORT: 3003
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: ${SMTP_HOST:-sandbox.smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-"Healthcare Scheduling" <noreply@healthcare.com>}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3003}:3003"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - healthcare-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        AUTH_SERVICE_URL: http://auth-service:3001/graphql
        SCHEDULE_SERVICE_URL: http://schedule-service:3002/graphql
    container_name: healthcare-frontend
    environment:
      NODE_ENV: production
      AUTH_SERVICE_URL: http://auth-service:3001/graphql
      SCHEDULE_SERVICE_URL: http://schedule-service:3002/graphql
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      schedule-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - healthcare-network

volumes:
  postgres_data:
  redis_data:

networks:
  healthcare-network:
    driver: bridge
